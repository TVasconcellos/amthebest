<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A&M Streetwear</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>

<body>

<!-- HERO -->
<section id="hero">
  <canvas id="webgl"></canvas>

  <div class="hero-content">
    <img src="assets/logo.png" class="logo"/>
    <h1>Built by friends.<br/>Worn with intent.</h1>
    <button class="cta">Shop Drop</button>
  </div>
</section>

<!-- PRODUCTS -->
<section id="products">
  <h2>Featured</h2>
  <div class="product-grid" id="productGrid"></div>
</section>

<!-- STORY -->
<section id="story">
  <div class="story-content">
    <h2>Two friends. One vision.</h2>
    <p>
      A&M started with late-night ideas and turned into wearable identity.
      No hype. Just intention.
    </p>
  </div>
</section>

<!-- CTA -->
<section id="cta">
  <h2>Next drop incoming</h2>
  <button class="cta large">Get Notified</button>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 A&M</p>
</footer>

<script type="module" src="js/main.js"></script>
</body>
</html>
